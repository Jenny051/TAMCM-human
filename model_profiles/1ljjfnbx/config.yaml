nn:
  data:
    _target_: volumetric_bodyfit.dataflow.lightning_bridge.ShapeFieldDataModule
    overfit: false
    gpus: 1
    datasets:
      version: V1_SV1_T3
      n_data: 0
      n_points: 0
      template: false
      red_factor: 10
      type: occ_dist
      res: 64
      train:
        _target_: volumetric_bodyfit.dataflow.surface_samples.SmplFieldDataset
        version: V1_SV1_T3
        n_data: 0
        n_points: 0
        template: false
        seed_idxs: 0
        fine_std: 0.05
        n_uniform: 400
        n_fine_sampled: 1800
        red_factor: 10
        type: occ_dist
        res: 64
        locality: 0
        v_locality: 0
        segm: 16
        coeffs: false
    num_workers:
      train: 24
      val: 16
      test: 16
    batch_size:
      train: 8
      val: 4
      test: 4
  module:
    _target_: volumetric_bodyfit.solver.system.FieldRegistrationModule
    paradigm: LVD
    n_basis: 20
    n_desc: 40
    n_layers: 10
    size_layers: 256
    n_points: 0
    template: false
    locality: 0
    fine_std: 0.05
    n_uniform: 400
    n_fine_sampled: 1800
    selfsup: false
    grad: 100
    clamp: 0.05
    clamp_style: 1
    gpus: 1
    powerup: 1
    power_factor: 2
    segm: 16
    positional: 0
    optimizer:
      _target_: torch.optim.Adam
      lr: 0.0001
      betas:
      - 0.9
      - 0.999
      eps: 1.0e-08
      weight_decay: 0
    lr_scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingWarmRestarts
      T_0: 10
      T_mult: 2
      eta_min: 0
      last_epoch: -1
      verbose: false
train:
  seed_index: 3407
  deterministic: false
  trainer:
    fast_dev_run: false
    gpus: 1
    precision: 32
    max_epochs: 10
    max_steps: 1000000000
    accumulate_grad_batches: 1
    num_sanity_val_steps: 2
    gradient_clip_val: 10.0
    val_check_interval: 1.0
    deterministic: false
  restore:
    ckpt_or_run_path: null
    mode: continue
  monitor:
    metric: loss/val
    mode: min
  callbacks:
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    patience: 100000
    verbose: false
    monitor: loss/val
    mode: min
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    save_top_k: 1
    verbose: false
    monitor: loss/val
    mode: min
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
    logging_interval: step
    log_momentum: false
  - _target_: pytorch_lightning.callbacks.progress.tqdm_progress.TQDMProgressBar
    refresh_rate: 20
  logging:
    upload:
      run_files: true
      source: true
    logger:
      _target_: pytorch_lightning.loggers.WandbLogger
      project: matchAMASS
      entity: null
      log_model: true
      mode: online
      tags:
      - TEST_FIN
    wandb_watch:
      log: all
      log_freq: 100
core:
  project_name: matchAMASS
  profile_dir: ${oc.env:BODYFIT_MODEL_PROFILE_DIR,./model_profiles}
  version: 0.0.1
  tags:
  - TEST_FIN






